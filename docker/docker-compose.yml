services:
  db:
    image: postgres:16-alpine
    container_name: pos-postgres
    environment:
      POSTGRES_DB: pos_test
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo17
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d pos_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  odoo:
    image: odoo:17.0
    container_name: pos-odoo
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo17
      DB_NAME: pos_test
      ADMIN_PASSWORD: admin
      POS_DEMO: "true"
    volumes:
      - odoo_data:/var/lib/odoo
      - odoo_config:/etc/odoo
      - ./entrypoint.sh:/entrypoint-custom.sh
    ports:
      - "8069:8069"
    entrypoint: ["/bin/bash", "/entrypoint-custom.sh"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069/web/login"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  adminer:
    image: adminer:latest
    container_name: pos-adminer
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
  odoo_data:
  odoo_config:
