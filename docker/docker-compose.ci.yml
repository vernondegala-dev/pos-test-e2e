version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pos_test
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo17
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d pos_test"]
      interval: 5s
      timeout: 3s
      retries: 10
    tmpfs: /var/lib/postgresql/data

  odoo:
    image: odoo:17.0
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo17
      DB_NAME: pos_test
      ADMIN_PASSWORD: admin
    volumes:
      - ./entrypoint.sh:/entrypoint-custom.sh
    ports:
      - "8069:8069"
    entrypoint: ["/bin/bash", "/entrypoint-custom.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069/web/login"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s
