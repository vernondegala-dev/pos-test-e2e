[pytest]
testpaths = src/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    smoke: Quick smoke tests for CI
    functional: Full functional test suite
    negative: Negative/scenario tests
    performance: Performance and load tests
    regression: Full regression suite
    integration: Integration tests (POS-Inventory, Payment-Accounting)
    security: Security and vulnerability tests
    network: Network resilience and offline tests
    compatibility: Cross-browser and resolution compatibility
    usability: UI/UX and accessibility tests
    tax: Tax calculation and compliance tests
    returns: Return and exchange workflow tests
    inventory: Inventory management tests
    barcode: Barcode scanning and search tests
    payment_methods: Multi-payment method tests (cash, card, split)
    receipt: Receipt generation and content verification tests
    stock_alerts: Stock threshold and reorder alert tests
    offline: Offline mode and data sync tests
    multi_currency: Multi-currency and multi-language tests

addopts =
    -v
    --strict-markers
    --tb=short
    --maxfail=5
    --alluredir=reports/allure-results
    --junitxml=reports/junit/results.xml
    --durations=10

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S
